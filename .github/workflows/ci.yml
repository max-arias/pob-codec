name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile
      - name: Check
        run: vp check
      - name: Test
        run: vp test
      - name: Build
        run: vp pack
