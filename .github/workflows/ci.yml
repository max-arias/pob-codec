name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install VitePlus
        run: curl -fsSL https://vite.plus | bash
      - name: Install dependencies
        run: vp install
      - name: Check
        run: vp check
      - name: Test
        run: vp test
      - name: Build
        run: vp pack
